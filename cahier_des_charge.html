        <h1>3. Guide de Référence du Code Backend (PHP & PDO)</h1>
        <h2>3.1 Connexion Hybride Intelligente (db.php)</h2>
        <p>Le fichier de connexion implémente une détection d'environnement automatique. Cela élimine le besoin de modifier manuellement le code lors de la bascule entre le développement sur Laragon et le déploiement sur le cloud (Render/InfinityFree).</p>
        <pre>
&lt;?php
if ($_SERVER['HTTP_HOST'] == 'localhost' || $_SERVER['HTTP_HOST'] == '127.0.0.1') {
    $host = 'localhost';
    $db   = 'bibliotheque';
    $user = 'root';
    $pass = '';
} else {
    $host = getenv('DB_HOST');
    $db   = getenv('DB_NAME');
    $user = getenv('DB_USER');
    $pass = getenv('DB_PASS');
}

$charset = 'utf8mb4';
$dsn = "mysql:host=$host;dbname=$db;charset=$charset";

try {
     $pdo = new PDO($dsn, $user, $pass);
} catch (\\PDOException $e) {
     die("Erreur de connexion : " . $e->getMessage());
}
?&gt;</pre>
